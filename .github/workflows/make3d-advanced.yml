name: Make3D Advanced Core

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, test, and generate samples
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Generate portfolio samples
        run: build/Release/Make3DGenerateAdvancedSamples.exe build/generated_samples

      - name: Upload smoke-test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: make3d-smoke-test-output
          path: build/test_output
          if-no-files-found: ignore

      - name: Upload generated advanced samples
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: make3d-generated-advanced-samples
          path: build/generated_samples
          if-no-files-found: ignore
